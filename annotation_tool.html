<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EQ Annotation Tool</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 15px; }

  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 16px; padding: 48px 40px; width: 440px; text-align: center; }
  .login-card h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
  .login-card p { color: #666; margin-bottom: 32px; font-size: 14px; }
  .annotator-list { display: flex; flex-direction: column; gap: 10px; }
  .annotator-btn { background: #fff; border: 1.5px solid #d0d0d0; border-radius: 10px; padding: 14px 20px; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: all 0.15s; }
  .annotator-btn:hover { border-color: #5b5bd6; background: #f4f4ff; color: #5b5bd6; }
  .annotator-btn .badge { font-size: 12px; color: #999; background: #f0f0f0; padding: 2px 8px; border-radius: 20px; }
  .annotator-btn.done .badge { background: #e8f5e9; color: #2e7d32; }

  #main { display: none; }
  header { background: #fff; border-bottom: 1px solid #e8e8e8; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  header .left { display: flex; align-items: center; gap: 16px; }
  header h2 { font-size: 16px; font-weight: 600; }
  .progress-wrap { display: flex; align-items: center; gap: 10px; }
  .progress-bar-bg { width: 160px; height: 6px; background: #e8e8e8; border-radius: 3px; }
  .progress-bar { height: 6px; background: #5b5bd6; border-radius: 3px; transition: width 0.3s; }
  .progress-text { font-size: 13px; color: #666; }
  .btn-logout { font-size: 13px; color: #999; background: none; border: none; cursor: pointer; padding: 6px 10px; border-radius: 6px; }
  .btn-logout:hover { background: #f0f0f0; color: #333; }

  .content { max-width: 820px; margin: 32px auto; padding: 0 20px 80px; }

  .card { background: #fff; border: 1px solid #e8e8e8; border-radius: 14px; padding: 24px; margin-bottom: 20px; }
  .card-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #999; margin-bottom: 10px; }
  .source-caption { font-size: 16px; line-height: 1.6; color: #1a1a1a; background: #f8f7ff; border-left: 3px solid #5b5bd6; padding: 12px 16px; border-radius: 0 8px 8px 0; }
  .meta { display: flex; gap: 10px; margin-top: 12px; }
  .tag { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: #f0f0f0; color: #555; }

  .task-header { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .task-desc { font-size: 13px; color: #666; margin-bottom: 18px; line-height: 1.5; }

  .query-box { background: #f9f9f9; border: 1px solid #e8e8e8; border-radius: 10px; padding: 16px 18px; font-size: 15px; line-height: 1.6; color: #1a1a1a; margin-bottom: 20px; }

  .type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 8px; }
  .type-btn { border: 1.5px solid #e0e0e0; background: #fff; border-radius: 10px; padding: 12px 8px; font-size: 13px; cursor: pointer; text-align: center; transition: all 0.15s; color: #333; }
  .type-btn:hover { border-color: #5b5bd6; background: #f4f4ff; }
  .type-btn.selected { border-color: #5b5bd6; background: #5b5bd6; color: #fff; font-weight: 500; }
  .type-label { font-size: 11px; margin-top: 4px; color: #888; }
  .type-btn.selected .type-label { color: #c4c4ff; }

  .t2-result { margin-top: 14px; padding: 12px 16px; border-radius: 8px; font-size: 14px; display: none; }
  .t2-result.correct { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
  .t2-result.wrong { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }

  .divider { border: none; border-top: 1px solid #eee; margin: 24px 0; }

  .query-row { border: 1px solid #e8e8e8; border-radius: 12px; padding: 18px; margin-bottom: 12px; }
  .query-row-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .query-type-badge { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; }
  .badge-full_caption { background: #e3f2fd; color: #1565c0; }
  .badge-key_phrase { background: #f3e5f5; color: #6a1b9a; }
  .badge-statement { background: #e8f5e9; color: #2e7d32; }
  .badge-question { background: #fff8e1; color: #e65100; }
  .badge-command { background: #fce4ec; color: #880e4f; }
  .badge-indirect { background: #e0f2f1; color: #00695c; }
  .query-text { font-size: 14px; line-height: 1.6; color: #333; margin-bottom: 14px; }

  .align-btns { display: flex; gap: 8px; margin-bottom: 12px; }
  .align-btn { border: 1.5px solid #e0e0e0; background: #fff; border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; transition: all 0.15s; color: #333; }
  .align-btn:hover { border-color: #aaa; }
  .align-btn.aligned.selected { border-color: #2e7d32; background: #2e7d32; color: #fff; }
  .align-btn.misaligned.selected { border-color: #c62828; background: #c62828; color: #fff; }

  .sub-labels { display: none; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .sub-labels.visible { display: flex; }
  .sub-check { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #444; background: #fff5f5; border: 1px solid #ffcdd2; border-radius: 6px; padding: 6px 12px; cursor: pointer; user-select: none; }
  .sub-check input { cursor: pointer; accent-color: #c62828; }
  .sub-check:hover { background: #ffebee; }

  .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e8e8e8; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; z-index: 100; }
  .nav-bar .center { font-size: 13px; color: #888; }
  .btn { padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: #5b5bd6; color: #fff; }
  .btn-primary:hover { background: #4a4ac4; }
  .btn-primary:disabled { background: #c4c4f0; cursor: not-allowed; }
  .btn-secondary { background: #fff; color: #333; border: 1.5px solid #d0d0d0; }
  .btn-secondary:hover { background: #f5f5f5; }
  .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-download { background: #fff; color: #5b5bd6; border: 1.5px solid #5b5bd6; }
  .btn-download:hover { background: #f4f4ff; }

  .done-screen { text-align: center; padding: 80px 20px; }
  .done-screen h2 { font-size: 24px; font-weight: 600; margin-bottom: 12px; }
  .done-screen p { color: #666; margin-bottom: 32px; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1>EQ Annotation</h1>
    <p>이름을 선택하고 어노테이션을 시작하세요</p>
    <div class="annotator-list" id="annotator-list"></div>
  </div>
</div>

<div id="main">
  <header>
    <div class="left">
      <h2 id="header-name">Annotator</h2>
      <div class="progress-wrap">
        <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
        <span class="progress-text" id="progress-text">0 / 100</span>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">← 목록으로</button>
  </header>

  <div class="content" id="content"></div>

  <div class="nav-bar">
    <button class="btn btn-secondary" id="btn-prev" onclick="navigate(-1)">← 이전</button>
    <span class="nav-bar center" id="nav-center"></span>
    <button class="btn btn-primary" id="btn-next" onclick="navigate(1)">다음 →</button>
  </div>
</div>

<script>
const ANNOTATORS = ['Annotator1','Annotator2','Annotator3','Annotator4','Annotator5','Annotator6'];
const EQ_TYPES = ['key_phrase','statement','question','command','indirect'];
const EQ_LABELS = {
  key_phrase: 'Key Phrase',
  statement: 'Statement',
  question: 'Question',
  command: 'Command',
  indirect: 'Indirect'
};
const SUB_LABELS = ['주체 추가','전후관계 변경','모션 추가/삭제','의미 왜곡'];

let DATA = null;
let currentAnnotator = null;
let myData = [];
let answers = {};
let currentIdx = 0;

async function loadData() {
  try {
    const resp = await fetch('./data.json');
    DATA = await resp.json();
  } catch(e) {
    DATA = EMBEDDED_DATA;
  }
  renderLogin();
}

function renderLogin() {
  const list = document.getElementById('annotator-list');
  list.innerHTML = '';
  const total = DATA.length;
  ANNOTATORS.forEach(name => {
    const saved = getSaved(name);
    const count = saved ? Object.keys(saved.answers || {}).length : 0;
    const done = count >= total;
    const btn = document.createElement('button');
    btn.className = 'annotator-btn' + (done ? ' done' : '');
    btn.innerHTML = `<span>${name}</span><span class="badge">${done ? '완료' : count + ' / ' + total}</span>`;
    btn.onclick = () => startAnnotation(name);
    list.appendChild(btn);
  });
}

function getSaved(name) {
  try { return JSON.parse(localStorage.getItem('eq_ann_' + name)) || null; } catch { return null; }
}
function saveProgress() {
  localStorage.setItem('eq_ann_' + currentAnnotator, JSON.stringify({ answers }));
}

function startAnnotation(name) {
  currentAnnotator = name;
  myData = DATA;
  const saved = getSaved(name);
  answers = saved ? (saved.answers || {}) : {};
  currentIdx = 0;
  for (let i = 0; i < myData.length; i++) {
    if (!answers[myData[i].audio_id]) { currentIdx = i; break; }
    if (i === myData.length - 1) currentIdx = myData.length - 1;
  }
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  document.getElementById('header-name').textContent = name;
  renderItem();
}

function logout() {
  document.getElementById('main').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  renderLogin();
}

function getRandomType(audioId) {
  let hash = 0;
  for (let c of audioId) hash = ((hash << 5) - hash) + c.charCodeAt(0);
  return EQ_TYPES[Math.abs(hash) % EQ_TYPES.length];
}

function renderItem() {
  const item = myData[currentIdx];
  const done = Object.keys(answers).length;
  const total = myData.length;
  document.getElementById('progress-bar').style.width = (done / total * 100) + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total;
  document.getElementById('nav-center').textContent = (currentIdx + 1) + ' / ' + total;
  document.getElementById('btn-prev').disabled = currentIdx === 0;
  document.getElementById('btn-next').textContent = currentIdx === total - 1 ? '저장 & 다운로드' : '다음 →';

  const randomType = getRandomType(item.audio_id);
  const ann = answers[item.audio_id] || {};

  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="card">
      <div class="card-label">Source Caption</div>
      <div class="source-caption">${item.source_caption}</div>
      <div class="meta">
        <span class="tag">${item.dataset}</span>
        <span class="tag">${item.audio_id}</span>
      </div>
    </div>

    <div class="card">
      <div class="task-header">Task 2 — Query-Type Conformity</div>
      <div class="task-desc">아래 query를 보고 어떤 EQ 유형인지 선택하세요.</div>
      <div class="query-box">${item[randomType]}</div>
      <div class="type-grid" id="type-grid">
        ${EQ_TYPES.map(t => `
          <button class="type-btn ${ann.t2 === t ? 'selected' : ''}" onclick="selectType('${t}','${randomType}','${item.audio_id}')">
            ${EQ_LABELS[t]}
          </button>
        `).join('')}
      </div>
      <div class="t2-result" id="t2-result">${ann.t2 ? getT2Result(ann.t2, randomType) : ''}</div>
      ${ann.t2 ? `<script>setTimeout(()=>showT2Result('${ann.t2}','${randomType}'),0)<\/script>` : ''}
    </div>

    <div class="card">
      <div class="task-header">Task 1 — Semantic Alignment</div>
      <div class="task-desc">각 query가 source caption과 의미적으로 일치하는지 평가하세요.<br>Misaligned 선택 시 세부 이유를 체크하세요.</div>
      ${EQ_TYPES.map(t => renderQueryRow(t, item, ann)).join('')}
    </div>
  `;
}

function renderQueryRow(type, item, ann) {
  const key = 't1_' + type;
  const subKey = 't1_sub_' + type;
  const sel = ann[key];
  const subs = ann[subKey] || [];
  return `
    <div class="query-row" id="row_${type}">
      <div class="query-row-header">
        <span class="query-type-badge badge-${type}">${EQ_LABELS[type]}</span>
      </div>
      <div class="query-text">${item[type]}</div>
      <div class="align-btns">
        <button class="align-btn aligned ${sel === 'aligned' ? 'selected' : ''}"
          onclick="selectAlign('${type}','aligned','${item.audio_id}')">✓ Aligned</button>
        <button class="align-btn misaligned ${sel === 'misaligned' ? 'selected' : ''}"
          onclick="selectAlign('${type}','misaligned','${item.audio_id}')">✗ Misaligned</button>
      </div>
      <div class="sub-labels ${sel === 'misaligned' ? 'visible' : ''}" id="sub_${type}">
        ${SUB_LABELS.map(s => `
          <label class="sub-check">
            <input type="checkbox" ${subs.includes(s) ? 'checked' : ''}
              onchange="toggleSub('${type}','${s}','${item.audio_id}')"> ${s}
          </label>
        `).join('')}
      </div>
    </div>
  `;
}

function selectType(selected, correct, audioId) {
  if (!answers[audioId]) answers[audioId] = {};
  answers[audioId].t2 = selected;
  answers[audioId].t2_correct = correct;
  saveProgress();
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  showT2Result(selected, correct);
}

function getT2Result(selected, correct) {
  if (selected === correct) return '✓ 정답! 실제 유형: ' + EQ_LABELS[correct];
  return '✗ 오답. 실제 유형: ' + EQ_LABELS[correct];
}

function showT2Result(selected, correct) {
  const el = document.getElementById('t2-result');
  if (!el) return;
  el.style.display = 'block';
  el.className = 't2-result ' + (selected === correct ? 'correct' : 'wrong');
  el.textContent = getT2Result(selected, correct);
}

function selectAlign(type, val, audioId) {
  if (!answers[audioId]) answers[audioId] = {};
  answers[audioId]['t1_' + type] = val;
  if (val === 'aligned') answers[audioId]['t1_sub_' + type] = [];
  saveProgress();

  const row = document.getElementById('row_' + type);
  row.querySelectorAll('.align-btn').forEach(b => b.classList.remove('selected'));
  row.querySelector('.align-btn.' + val).classList.add('selected');
  const subEl = document.getElementById('sub_' + type);
  if (val === 'misaligned') subEl.classList.add('visible');
  else subEl.classList.remove('visible');
}

function toggleSub(type, label, audioId) {
  if (!answers[audioId]) answers[audioId] = {};
  let subs = answers[audioId]['t1_sub_' + type] || [];
  if (subs.includes(label)) subs = subs.filter(s => s !== label);
  else subs.push(label);
  answers[audioId]['t1_sub_' + type] = subs;
  saveProgress();
}

function isCurrentDone() {
  const item = myData[currentIdx];
  const ann = answers[item.audio_id] || {};
  if (!ann.t2) return false;
  for (const t of EQ_TYPES) {
    if (!ann['t1_' + t]) return false;
  }
  return true;
}

function navigate(dir) {
  if (dir === 1 && currentIdx === myData.length - 1) {
    downloadResults();
    return;
  }
  currentIdx = Math.max(0, Math.min(myData.length - 1, currentIdx + dir));
  renderItem();
  window.scrollTo(0, 0);
}

function downloadResults() {
  const rows = [];
  const header = ['audio_id','dataset','source_caption',
    't2_selected','t2_correct','t2_is_correct',
    ...EQ_TYPES.flatMap(t => ['t1_'+t, 't1_sub_'+t])
  ];
  rows.push(header.join(','));
  myData.forEach(item => {
    const ann = answers[item.audio_id] || {};
    const row = [
      item.audio_id, item.dataset,
      '"' + (item.source_caption||'').replace(/"/g,'""') + '"',
      ann.t2 || '',
      ann.t2_correct || '',
      ann.t2 && ann.t2_correct ? (ann.t2 === ann.t2_correct ? 'TRUE' : 'FALSE') : '',
      ...EQ_TYPES.flatMap(t => [
        ann['t1_'+t] || '',
        '"' + (ann['t1_sub_'+t] || []).join(';') + '"'
      ])
    ];
    rows.push(row.join(','));
  });
  const blob = new Blob(['\uFEFF' + rows.join('\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = currentAnnotator + '_annotations.csv';
  a.click();
}

const EMBEDDED_DATA = [];

loadData();
</script>
</body>
</html>
